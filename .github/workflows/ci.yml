name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        env:
          VITE_GOOGLE_CLIENT_ID: "test-client-id"
        run: npm run build

  tofu-plan:
    name: tofu plan
    needs: test-and-build
    if: (github.ref == 'refs/heads/main' || github.event_name == 'pull_request') && github.ref != 'refs/heads/staging'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tf

    steps:
      - uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          tofu init \
            -backend-config="endpoints={s3=\"https://${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: tofu plan
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_google_client_id: "plan-placeholder"
          TF_VAR_google_client_id_staging: "plan-placeholder"
          TF_VAR_github_owner_id: ${{ secrets.TF_VAR_GITHUB_OWNER_ID }}
          TF_VAR_github_repo_id: ${{ secrets.TF_VAR_GITHUB_REPO_ID }}
        run: tofu plan

  tofu-apply:
    name: tofu apply
    needs: tofu-plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: tf

    steps:
      - uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: tofu init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          tofu init \
            -backend-config="endpoints={s3=\"https://${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: tofu apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_VAR_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_github_owner_id: ${{ secrets.TF_VAR_GITHUB_OWNER_ID }}
          TF_VAR_github_repo_id: ${{ secrets.TF_VAR_GITHUB_REPO_ID }}
          TF_VAR_google_client_id: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_id_staging: ${{ secrets.TF_VAR_GOOGLE_CLIENT_ID_STAGING }}
        run: tofu apply -auto-approve
